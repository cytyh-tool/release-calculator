<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release Date Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0f11; --bg2: #161719; --bg3: #1e2024;
    --border: #2a2c31; --border2: #35383e;
    --text: #e8e9eb; --text2: #8b8f99; --text3: #55585f;
    --accent: #5b6ef5; --accent2: #8b9aff; --accent-glow: rgba(91,110,245,0.15);
    --purple: #7c6ef5; --amber: #e8a340; --teal: #3dbf8c;
    --blue: #4a9eff; --green: #6bbd5b; --coral: #f07060; --red: #e05050;
    --mono: 'DM Mono', monospace; --sans: 'Sora', sans-serif;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px; opacity: 0.3; pointer-events: none; z-index: 0;
  }
  .container { position: relative; z-index: 1; width: 100%; max-width: 680px; padding: 48px 24px 80px; }
  header { margin-bottom: 48px; }
  .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; color: var(--accent2); text-transform: uppercase; margin-bottom: 12px; }
  h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 600; letter-spacing: -0.03em; line-height: 1.1; color: var(--text); }
  h1 span { color: var(--accent2); }
  .subtitle { margin-top: 10px; font-size: 14px; color: var(--text2); font-weight: 300; }
  .input-card {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 16px; padding: 24px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .input-card label { font-family: var(--mono); font-size: 12px; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
  input[type="date"] {
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px;
    color: var(--text); font-family: var(--mono); font-size: 18px; font-weight: 500;
    padding: 10px 16px; outline: none; transition: border-color 0.2s;
    flex: 1; min-width: 180px; color-scheme: dark;
  }
  input[type="date"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .copy-all-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 10px 20px; font-family: var(--mono); font-size: 12px;
    letter-spacing: 0.05em; cursor: pointer; white-space: nowrap; transition: background 0.2s, transform 0.1s;
  }
  .copy-all-btn:hover { background: var(--accent2); }
  .copy-all-btn:active { transform: scale(0.97); }

  /* Holiday banner */
  .holiday-banner {
    display: none; align-items: flex-start; gap: 10px;
    background: rgba(224, 80, 80, 0.08); border: 1px solid rgba(224,80,80,0.3);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 24px;
    font-size: 13px; color: #f09090; line-height: 1.6;
  }
  .holiday-banner.visible { display: flex; }
  .holiday-banner .icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .holiday-banner ul { list-style: none; margin-top: 4px; }
  .holiday-banner ul li::before { content: '• '; color: var(--red); }

  .timeline { position: relative; }
  .timeline::before {
    content: ''; position: absolute; left: 119px; top: 20px; bottom: 20px; width: 1px;
    background: linear-gradient(to bottom, transparent, var(--border2) 10%, var(--border2) 90%, transparent);
  }
  .phase-row { display: flex; align-items: flex-start; gap: 0; padding: 6px 0; position: relative; }
  .phase-row.is-release .phase-card { border-color: var(--coral); box-shadow: 0 0 20px rgba(240,112,96,0.1); }
  .phase-label { width: 108px; min-width: 108px; text-align: right; padding-right: 20px; padding-top: 14px; }
  .phase-label-name { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.06em; line-height: 1.4; text-transform: uppercase; }
  .phase-dot-col { width: 24px; min-width: 24px; display: flex; flex-direction: column; align-items: center; padding-top: 18px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid; background: var(--bg); flex-shrink: 0; }
  .phase-card {
    flex: 1; margin-left: 16px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px; transition: border-color 0.2s;
    cursor: default; position: relative; overflow: hidden;
  }
  .phase-card:hover { border-color: var(--border2); }
  .phase-card-left { flex: 1; }
  .phase-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .phase-desc { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .phase-card-right { text-align: right; flex-shrink: 0; }
  .phase-date { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--text); }
  .phase-day { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 2px; }
  .phase-badge { display: inline-block; font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 99px; margin-top: 4px; letter-spacing: 0.06em; }
  .weekend-warn { font-family: var(--mono); font-size: 10px; color: var(--amber); margin-top: 3px; }
  .holiday-warn { font-family: var(--mono); font-size: 10px; color: var(--red); margin-top: 3px; }
  .row-copy {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text3); font-family: var(--mono); font-size: 10px; padding: 4px 8px;
    cursor: pointer; opacity: 0; transition: opacity 0.15s;
  }
  .phase-card:hover .row-copy { opacity: 1; }
  .row-copy:hover { color: var(--text2); border-color: var(--border2); }
  footer { margin-top: 48px; font-family: var(--mono); font-size: 11px; color: var(--text3); text-align: center; letter-spacing: 0.06em; }

  .c-purple .dot { border-color: var(--purple); background: rgba(124,110,245,0.2); }
  .c-amber  .dot { border-color: var(--amber);  background: rgba(232,163,64,0.2); }
  .c-teal   .dot { border-color: var(--teal);   background: rgba(61,191,140,0.2); }
  .c-blue   .dot { border-color: var(--blue);   background: rgba(74,158,255,0.2); }
  .c-green  .dot { border-color: var(--green);  background: rgba(107,189,91,0.2); }
  .c-coral  .dot { border-color: var(--coral);  background: rgba(240,112,96,0.2); }
  .c-purple .phase-badge { background: rgba(124,110,245,0.12); color: #b0a6f8; }
  .c-amber  .phase-badge { background: rgba(232,163,64,0.12);  color: #e8b870; }
  .c-teal   .phase-badge { background: rgba(61,191,140,0.12);  color: #5fd4a8; }
  .c-blue   .phase-badge { background: rgba(74,158,255,0.12);  color: #7bb8ff; }
  .c-green  .phase-badge { background: rgba(107,189,91,0.12);  color: #8fd080; }
  .c-coral  .phase-badge { background: rgba(240,112,96,0.12);  color: #f09080; }
  .c-coral .phase-card { border-color: rgba(240,112,96,0.25); }

  /* Holiday hit highlight on card */
  .has-holiday .phase-card { border-color: rgba(224,80,80,0.35) !important; }

  @media (max-width: 500px) {
    .timeline::before { left: 79px; }
    .phase-label { width: 68px; min-width: 68px; }
    .phase-label-name { font-size: 9px; }
    .phase-date { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">Release Planner</div>
    <h1>Release Date <span>Calculator</span></h1>
    <p class="subtitle">Pick a release date — all key milestones are calculated automatically.</p>
  </header>

  <div class="input-card">
    <label>🗓 Release Date</label>
    <input type="date" id="release-date">
    <button class="copy-all-btn" onclick="copyAll()">Copy All Dates</button>
  </div>

  <div class="holiday-banner" id="holiday-banner">
    <div class="icon">🇹🇼</div>
    <div>
      <strong style="color:#f09090;">Taiwan Public Holiday Conflicts</strong>
      <ul id="holiday-list"></ul>
    </div>
  </div>

  <div class="timeline" id="timeline"></div>

  <footer>Release Planner · Milestones based on historical release schedule · TW holidays per 行政院人事行政總處 (2026–2027)</footer>
</div>

<script>
// Taiwan public holidays 2026 & 2027 — 僅列平日假日（週末本身已有 weekend 警告，不重複標示）
// 資料來源：行政院人事行政總處 115年（2025/06/13）及 116年（2026/05/21）政府行政機關辦公日曆表
const TW_HOLIDAYS_2026 = {
  // 2026
  "2026-01-01": "New Year's Day（開國紀念日）",
  "2026-02-16": "Lunar New Year's Eve（除夕）",
  "2026-02-17": "Lunar New Year Day 1（春節初一）",
  "2026-02-18": "Lunar New Year Day 2（春節初二）",
  "2026-02-19": "Lunar New Year Day 3（春節初三）",
  "2026-02-20": "Lunar New Year Makeup Holiday（春節補假）",
  "2026-02-27": "228 Makeup Holiday（和平紀念日補假）",
  "2026-04-03": "Children's Day Makeup Holiday（兒童節補假）",
  "2026-04-06": "Tomb Sweeping Makeup Holiday（清明節補假）",
  "2026-05-01": "Labor Day（勞動節）",
  "2026-06-19": "Dragon Boat Festival（端午節）",
  "2026-09-25": "Mid-Autumn Festival（中秋節）",
  "2026-09-28": "Teacher's Day（教師節）",
  "2026-10-09": "National Day Makeup Holiday（國慶日補假）",
  "2026-10-26": "Taiwan Retrocession Makeup Holiday（光復節補假）",
  "2026-12-25": "Constitution Day（行憲紀念日）",
  // 2027
  "2027-01-01": "New Year's Day（開國紀念日）",
  "2027-02-04": "Lunar New Year's Eve Eve（小年夜）",
  "2027-02-05": "Lunar New Year's Eve（除夕）",
  "2027-02-08": "Lunar New Year Day 3（春節初三）",
  "2027-02-09": "Lunar New Year Makeup Holiday（春節補假）",
  "2027-02-10": "Lunar New Year Makeup Holiday（春節補假）",
  "2027-03-01": "228 Makeup Holiday（和平紀念日補假）",
  "2027-04-05": "Tomb Sweeping Day（清明節）",
  "2027-04-06": "Children's Day Makeup Holiday（兒童節補假）",
  "2027-04-30": "Labor Day Makeup Holiday（勞動節補假）",
  "2027-06-09": "Dragon Boat Festival（端午節）",
  "2027-09-15": "Mid-Autumn Festival（中秋節）",
  "2027-09-28": "Teacher's Day（教師節）",
  "2027-10-11": "National Day Makeup Holiday（國慶日補假）",
  "2027-10-25": "Taiwan Retrocession Day（台灣光復節）",
  "2027-12-24": "Constitution Day Makeup Holiday（行憲紀念日補假）",
  "2027-12-31": "New Year's Eve Makeup Holiday（2028元旦補假）",
};

const PHASES = [
  { name: "Scope Lock Down 1", desc: "First scope confirmation",      offset: -32, type: "single", color: "purple", badge: "SCOPE" },
  { name: "Est Day",           desc: "Effort estimation",             offset: -31, type: "single", color: "purple", badge: "PLAN"  },
  { name: "Scope Lock Down 2", desc: "Second scope confirmation",     offset: -23, type: "single", color: "amber",  badge: "SCOPE" },
  { name: "Dev",               desc: "Development period",            type: "range", offsetStart: -30, offsetEnd: -18, color: "teal",  badge: "DEV" },
  { name: "QA",                desc: "Testing period",                type: "range", offsetStart: -17, offsetEnd: -3,  color: "blue",  badge: "QA"  },
  { name: "QA Report & Note",  desc: "QA report & release notes due", offset: -2,  type: "single", color: "green", badge: "DOCS" },
  { name: "Release",           desc: "Production deployment",         offset: 0,   type: "single", color: "coral", badge: "🚀 RELEASE" },
];

const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function toKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmt(d) { return toKey(d).replace(/-/g, '.'); }

function fmtShort(d) {
  return `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function isWeekend(d) { return d.getDay() === 0 || d.getDay() === 6; }

function getHoliday(d) { return TW_HOLIDAYS_2026[toKey(d)] || null; }

function isNonWorkingDay(d) { return isWeekend(d); }

// Add N calendar days skipping weekends only (negative = go back)
// offset=0 returns base date as-is
function addSkippingWeekends(base, n) {
  const d = new Date(base);
  if (n === 0) return d;
  const step = n > 0 ? 1 : -1;
  let remaining = Math.abs(n);
  while (remaining > 0) {
    d.setDate(d.getDate() + step);
    if (!isWeekend(d)) remaining--;
  }
  return d;
}

// Find holidays within a calendar range
function rangeHolidays(startDate, endDate) {
  const hits = [];
  const d = new Date(startDate);
  while (d <= endDate) {
    if (!isWeekend(d)) {
      const hol = getHoliday(d);
      if (hol) hits.push({ date: fmtShort(new Date(d)), name: hol });
    }
    d.setDate(d.getDate() + 1);
  }
  return hits;
}

function render() {
  const rv = document.getElementById('release-date').value;
  if (!rv) return;
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  const allHolidayHits = [];

  PHASES.forEach(p => {
    const row = document.createElement('div');
    let dateLabel = '', dayLabel = '', warnHtml = '', copyText = '';
    let hasHoliday = false;

    if (p.type === 'single') {
      const d = addSkippingWeekends(rv, p.offset);
      dateLabel = fmtShort(d);
      dayLabel = DAYS[d.getDay()];
      copyText = `${p.name}: ${fmt(d)}`;
      const hol = getHoliday(d);
      if (hol) {
        warnHtml = `<div class="holiday-warn">🇹🇼 ${hol}</div>`;
        hasHoliday = true;
        allHolidayHits.push({ phase: p.name, date: fmtShort(d), name: hol });
      }
    } else {
      const ds = addSkippingWeekends(rv, p.offsetStart);
      const de = addSkippingWeekends(rv, p.offsetEnd);
      dateLabel = `${fmtShort(ds)} – ${fmtShort(de)}`;
      const calDays = Math.round((de - ds) / (1000*60*60*24)) + 1;
      dayLabel = `${calDays} cal days`;
      copyText = `${p.name}: ${fmt(ds)} – ${fmt(de)}`;
      const hits = rangeHolidays(ds, de);
      if (hits.length > 0) {
        hasHoliday = true;
        warnHtml = `<div class="holiday-warn">🇹🇼 ${hits.length} holiday${hits.length>1?'s':''} in range</div>`;
        hits.forEach(h => allHolidayHits.push({ phase: p.name, date: h.date, name: h.name }));
      }
    }

    const offsetTxt = p.type === 'single'
      ? (p.offset === 0 ? 'R±0' : `R${p.offset}d`)
      : `R${p.offsetStart}~${p.offsetEnd}d`;

    row.className = `phase-row c-${p.color}${p.offset === 0 ? ' is-release' : ''}${hasHoliday ? ' has-holiday' : ''}`;
    row.innerHTML = `
      <div class="phase-label"><div class="phase-label-name">${offsetTxt}</div></div>
      <div class="phase-dot-col"><div class="dot"></div></div>
      <div class="phase-card">
        <div class="phase-card-left">
          <div class="phase-name">${p.name}</div>
          <div class="phase-desc">${p.desc}</div>
          <span class="phase-badge">${p.badge}</span>
        </div>
        <div class="phase-card-right">
          <div class="phase-date">${dateLabel}</div>
          <div class="phase-day">${dayLabel}</div>
          ${warnHtml}
        </div>
        <button class="row-copy" onclick="copyRow('${copyText}', this)">Copy</button>
      </div>`;
    tl.appendChild(row);
  });

  // Update banner
  const banner = document.getElementById('holiday-banner');
  const list = document.getElementById('holiday-list');
  if (allHolidayHits.length > 0) {
    list.innerHTML = allHolidayHits.map(h =>
      `<li><strong>${h.phase}</strong> · ${h.date} — ${h.name}</li>`
    ).join('');
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

function copyRow(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function copyAll() {
  const rv = document.getElementById('release-date').value;
  if (!rv) return;
  let out = `=== Release Schedule ===\nRelease Date: ${rv}\n\n`;
  PHASES.forEach(p => {
    if (p.type === 'single') {
      const d = addSkippingWeekends(rv, p.offset);
      out += `${p.name}: ${fmt(d)} (${DAYS[d.getDay()]})\n`;
    } else {
      const ds = addSkippingWeekends(rv, p.offsetStart);
      const de = addSkippingWeekends(rv, p.offsetEnd);
      out += `${p.name}: ${fmt(ds)} – ${fmt(de)}\n`;
    }
  });
  navigator.clipboard.writeText(out).then(() => {
    const btn = document.querySelector('.copy-all-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy All Dates', 2000);
  });
}

document.getElementById('release-date').addEventListener('change', render);
</script>
</body>
</html>
